name: dadosbr
description: "Aplicativo Android DadosBR para consultas publicas via BrasilAPI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: 6.3.3
  http: ^1.2.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  share_plus: ^11.0.0
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/flags/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/EliteLogo.png"
  adaptive_icon_background: "#000000" # Android
  adaptive_icon_foreground: "assets/logo/EliteLogo.png"